<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VidGF Cinema Player</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Mencegah scrollbar muncul */
            display: flex;
            flex-direction: column;
        }

        /* Header / Input Area */
        .header-nav {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .header-nav.hidden {
            transform: translateY(-100%);
            position: absolute;
        }

        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 5px;
            background: #252525;
            color: #fff;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background: #fe6081;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #status {
            color: #888;
            font-size: 12px;
            margin-top: 8px;
        }

        /* Video Area - Mengisi Seluruh Sisa Layar */
        #player-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100vw;
            height: 100%;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Menjaga rasio video asli */
            outline: none;
        }

        /* Tombol Toggle Header */
        .toggle-nav {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            z-index: 101;
            opacity: 0.3;
        }
        .toggle-nav:hover { opacity: 1; }
    </style>
</head>
<body>

    <button class="toggle-nav" onclick="toggleHeader()">SHOW/HIDE INPUT</button>

    <div class="header-nav" id="mainHeader">
        <div class="input-group">
            <input type="text" id="videoInput" placeholder="Paste Video ID or Link here...">
            <button onclick="processVideo()">UNLOCK</button>
        </div>
        <div id="status">Ready to stream...</div>
    </div>

    <div id="player-container">
        <video id="videoPlayer" controls autoplay>
            </video>
    </div>

    <script>
        function toggleHeader() {
            const header = document.getElementById('mainHeader');
            header.classList.toggle('hidden');
        }

        async function processVideo() {
            const input = document.getElementById('videoInput').value.trim();
            if (!input) return;

            const videoId = input.includes('/') ? input.split('/').pop().split('?')[0] : input;
            const status = document.getElementById('status');
            const video = document.getElementById('videoPlayer');

            status.innerText = "🔍 Scoping direct link...";
            
            try {
                const response = await fetch(`/api/get-video?id=${videoId}`);
                const data = await response.json();

                if (data.status === "success") {
                    status.innerText = "✅ Streaming: " + videoId;
                    video.src = data.link;
                    video.load();
                    video.play();
                    
                    // Sembunyikan header otomatis saat mulai nonton
                    setTimeout(toggleHeader, 2000);
                } else {
                    status.innerText = "❌ " + data.message;
                }
            } catch (err) {
                status.innerText = "❌ Connection failed.";
            }
        }
    </script>
</body>
</html>
