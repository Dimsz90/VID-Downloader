<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VidGF Premium Player</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; font-family: 'Inter', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Navigasi Input */
        .nav-bar {
            background: #111; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 1px solid #222; transition: 0.4s ease;
            z-index: 99;
        }
        .nav-bar.hidden { transform: translateY(-110%); position: absolute; }

        .search-box {
            display: flex; width: 100%; max-width: 700px; gap: 10px;
        }

        input {
            flex: 1; padding: 12px 15px; border-radius: 8px;
            border: 1px solid #333; background: #1a1a1a; color: #fff;
            font-size: 14px; outline: none;
        }

        button {
            padding: 12px 25px; background: #fe6081; color: #fff;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; transition: 0.3s;
        }
        button:hover { background: #e04566; }

        #msg { font-size: 12px; margin-top: 8px; color: #888; }

        /* Container Video Full Layar */
        #main-view {
            flex: 1; position: relative; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: contain; outline: none; }

        /* Floating Button untuk memunculkan kembali menu */
        .show-menu {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.1); border: none;
            color: #fff; padding: 5px 10px; border-radius: 5px;
            font-size: 10px; cursor: pointer; z-index: 100;
            opacity: 0.5; transition: 0.3s;
        }
        .show-menu:hover { opacity: 1; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <button class="show-menu" onclick="toggleNav()">MENU</button>

    <div class="nav-bar" id="topNav">
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="Paste Link VidGF atau ID di sini...">
            <button onclick="playVideo()">UNLOCK</button>
        </div>
        <div id="msg">Silakan masukkan link video untuk memulai.</div>
    </div>

    <div id="main-view">
        <video id="player" controls autoplay></video>
    </div>

    <script>
        function toggleNav() {
            document.getElementById('topNav').classList.toggle('hidden');
        }

        async function playVideo() {
            const rawInput = document.getElementById('urlInput').value.trim();
            if (!rawInput) return;

            // Ekstraksi ID: Mengambil bagian terakhir dari URL
            const id = rawInput.split('/').pop().split('?')[0];
            const msg = document.getElementById('msg');
            const player = document.getElementById('player');

            msg.innerText = "⏳ Sedang membypass server...";
            msg.style.color = "#fe6081";

            try {
                const res = await fetch(`/api/get-video?id=${id}`);
                const data = await res.json();

                if (data.status === "success") {
                    msg.innerText = "✅ Video berhasil dibuka!";
                    msg.style.color = "#4caf50";
                    
                    player.src = data.link;
                    player.load();
                    player.play();

                    // Auto-hide menu setelah 2 detik agar Full Layar
                    setTimeout(() => {
                        document.getElementById('topNav').classList.add('hidden');
                    }, 2000);
                } else {
                    msg.innerText = "❌ Gagal: " + data.message;
                    msg.style.color = "#ff5252";
                }
            } catch (err) {
                msg.innerText = "❌ Terjadi kesalahan jaringan.";
            }
        }
    </script>
</body>
</html>
