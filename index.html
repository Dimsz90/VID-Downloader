<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Video Unlocker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0b0b; color: white; text-align: center; margin: 0; padding: 20px; }
        .wrapper { max-width: 850px; margin: auto; }
        .header { margin-bottom: 40px; border-bottom: 2px solid #fe6081; display: inline-block; padding-bottom: 10px; }
        
        .input-area { background: #181818; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); margin-bottom: 30px; }
        input { padding: 14px; width: 65%; border: none; border-radius: 8px; background: #252525; color: white; font-size: 16px; margin-right: 10px; }
        button { padding: 14px 28px; background: #fe6081; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #e04566; transform: scale(1.02); }
        
        #player-container { display: none; margin-top: 20px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }
        
        #status { margin-top: 15px; color: #ffeb3b; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1 class="header">VidGF Secure Stream</h1>
    
    <div class="input-area">
        <input type="text" id="videoInput" placeholder="Masukkan Link atau ID Video...">
        <button onclick="startBypass()">Unlock Video</button>
        <div id="status"></div>
    </div>

    <div id="player-container">
        <div class="video-wrapper" id="video-mount">
            </div>
        <p style="color: #666; font-size: 13px; margin-top: 15px;">
            Note: Jika video tidak jalan, link asli mungkin memerlukan Referer khusus atau Token yang expired.
        </p>
    </div>
</div>

<script>
    async function startBypass() {
        const input = document.getElementById('videoInput').value.trim();
        if (!input) return;

        // Ekstrak ID dari URL jika perlu
        const videoId = input.includes('/') ? input.split('/').pop().split('?')[0] : input;
        const status = document.getElementById('status');
        const container = document.getElementById('player-container');
        const mount = document.getElementById('video-mount');

        status.innerText = "🔍 Mencari link video mentah...";
        status.style.color = "#ffeb3b";
        container.style.display = "none";

        try {
            const response = await fetch(`/api/get-video?id=${videoId}`);
            const data = await response.json();

            if (data.status === "success") {
                status.innerText = "✅ Video ditemukan! Memutar...";
                status.style.color = "#4caf50";
                container.style.display = "block";
                
                // Ganti isi wrapper dengan Native Video Player (Bypass Iframe)
                mount.innerHTML = `
                    <video id="myPlayer" controls autoplay>
                        <source src="${data.link}" type="video/mp4">
                        Your browser does not support HTML5 video.
                    </video>`;
            } else {
                status.innerText = "❌ " + data.message;
                status.style.color = "#f44336";
            }
        } catch (err) {
            status.innerText = "❌ Gagal menghubungi API Backend.";
            status.style.color = "#f44336";
        }
    }
</script>

</body>
</html>
