<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidGF Unlocker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0d;--card:#141414;--border:#242424;--border2:#303030;
    --text:#f2f2f2;--muted:#666;--muted2:#444;
    --accent:#fe6081;--accent-dim:rgba(254,96,129,0.12);--accent-glow:rgba(254,96,129,0.35);
    --green:#39ff85;
    --mono:'IBM Plex Mono',monospace;--display:'Barlow Condensed',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.35;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;width:100%;max-width:520px}
  .header{margin-bottom:1.8rem}
  .header-tag{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .header-tag::before{content:'';display:inline-block;width:20px;height:1px;background:var(--accent)}
  h1{font-family:var(--display);font-size:clamp(36px,8vw,56px);font-weight:800;line-height:.95;letter-spacing:-1px}
  h1 span{color:var(--accent)}
  .header-sub{margin-top:8px;font-size:11px;color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--border2);border-radius:4px;padding:20px;margin-bottom:12px}
  .input-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .input-row{display:flex;gap:8px}
  .url-input{flex:1;background:#0d0d0d;border:1px solid var(--border2);border-radius:3px;padding:10px 12px;font-size:12px;font-family:var(--mono);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;min-width:0}
  .url-input::placeholder{color:var(--muted2)}
  .url-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  .btn{background:var(--accent);color:#0d0d0d;border:none;border-radius:3px;padding:10px 18px;font-size:12px;font-weight:700;font-family:var(--display);letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:background .15s,transform .1s,box-shadow .15s}
  .btn:hover{background:#ff7a95;box-shadow:0 0 16px var(--accent-glow)}
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .loading-row{display:none;align-items:center;gap:10px;padding:12px 14px;background:#0d0d0d;border:1px solid var(--border2);border-radius:3px;font-size:11px;color:var(--muted);margin-bottom:12px}
  .dots{display:flex;gap:4px}
  .dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.2s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  .player-box{display:none;background:var(--card);border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-bottom:12px;animation:fadeUp .25s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  video{width:100%;display:block;background:#000;max-height:260px}
  .player-footer{padding:9px 12px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border)}
  .link-text{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .btn-sm{background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:3px;padding:5px 11px;font-size:11px;font-family:var(--display);font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s;text-decoration:none;display:inline-block}
  .btn-sm:hover{border-color:var(--text);color:var(--text)}
  .btn-sm.ok{border-color:var(--green);color:var(--green)}
  .error-box{display:none;background:rgba(254,96,129,.08);border:1px solid rgba(254,96,129,.25);border-radius:3px;padding:12px 14px;font-size:12px;color:var(--accent);margin-bottom:12px;animation:fadeUp .2s ease;line-height:1.7}
  .history-section{display:none;margin-top:4px}
  .section-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;display:flex;justify-content:space-between}
  .clear-btn{background:none;border:none;color:var(--muted2);font-size:10px;font-family:var(--mono);cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:color .15s}
  .clear-btn:hover{color:var(--accent)}
  .history-list{display:flex;flex-direction:column;gap:6px}
  .history-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:3px;font-size:11px;cursor:pointer;transition:border-color .15s;animation:fadeUp .2s ease both}
  .history-item:hover{border-color:var(--border2)}
  .h-id{font-weight:600;color:var(--accent);flex-shrink:0}
  .h-link{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}
  footer{margin-top:2rem;font-size:10px;color:var(--muted2);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-tag">Direct Link Tool</div>
    <h1>VIDGF<br><span>UNLOCKER</span></h1>
    <p class="header-sub">Masukkan ID atau URL vidgf.com → putar langsung.</p>
  </div>

  <div class="card">
    <div class="input-label">ID atau URL Video</div>
    <div class="input-row">
      <input class="url-input" id="videoInput" placeholder="4lqtl4a5bazb atau https://vidgf.com/d/..." />
      <button class="btn" id="fetchBtn" onclick="getLink()">Ambil</button>
    </div>
  </div>

  <div class="loading-row" id="loadingRow">
    <div class="dots"><span></span><span></span><span></span></div>
    <span id="loadingText">Mengambil link...</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="player-box" id="playerBox">
    <video id="videoEl" controls preload="metadata"></video>
    <div class="player-footer">
      <span class="link-text" id="linkText"></span>
      <button class="btn-sm" id="copyBtn" onclick="copyLink()">⎘ Salin</button>
      <a class="btn-sm" id="dlBtn" href="#" target="_blank">↗ Buka</a>
    </div>
  </div>

  <div class="history-section" id="historySection">
    <div class="section-label">Riwayat <button class="clear-btn" onclick="clearHistory()">Hapus</button></div>
    <div class="history-list" id="historyList"></div>
  </div>

  <footer>vidgf unlocker · pure client-side</footer>
</div>

<script>
let lastLink = "";
const hist = [];

function extractId(input) {
  input = input.trim();
  try {
    const parts = new URL(input).pathname.split("/").filter(Boolean);
    if (parts.length) return parts[parts.length - 1];
  } catch (_) {}
  return input.replace(/\//g, "");
}

async function getLink() {
  const raw = document.getElementById("videoInput").value.trim();
  if (!raw) return;
  const id  = extractId(raw);
  const btn = document.getElementById("fetchBtn");

  hide("playerBox"); hide("errorBox");
  show("loadingRow", "flex");
  btn.disabled = true; btn.textContent = "...";

  try {
    const link = await fetchEmbed(id);
    hide("loadingRow");
    if (link) {
      playVideo(link, id);
      addHist(id, link);
    } else {
      showErr("Link tidak ditemukan. Coba lagi atau cek ID-nya.");
    }
  } catch (e) {
    hide("loadingRow");
    showErr("Error: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Ambil";
  }
}

async function fetchEmbed(id) {
  // Fetch langsung dari browser — browser punya akses, server tidak
  const endpoints = [
    `https://vidgf.com/embed.php?id=${id}`,
    `https://vidgf.com/embed.php?bucket=temporary&id=${id}`,
    `https://vidgf.com/embed.php?bucket=permanent&id=${id}`,
  ];

  for (const url of endpoints) {
    setStatus("Mencoba " + url.split("?")[1] + "...");
    try {
      const res = await fetch(url, { credentials: "include" });
      if (!res.ok) continue;
      const html = await res.text();
      console.log("[vidgf] html from", url, ":", html.substring(0, 300));
      const link = parseLink(html);
      if (link) return link;
    } catch (e) {
      console.warn("[vidgf] fetch error:", e.message);
      // CORS error → coba iframe trick
      continue;
    }
  }

  // Fallback: load via hidden iframe, intercept src dari video element
  setStatus("Mencoba iframe...");
  return await iframeTrick(id);
}

function parseLink(html) {
  const patterns = [
    /https?:\/\/[^\s"'<>]+?\.mp4[^\s"'<>]*/i,
    /https?:\/\/[^\s"'<>]+?\.m3u8[^\s"'<>]*/i,
    /<source\b[^>]+src=["']([^"']+)["']/i,
    /(?:file|src|url)\s*[:=]\s*["']([^"']+)["']/i,
  ];
  for (const p of patterns) {
    const m = html.match(p);
    if (m) return (m[1] || m[0]).replace(/\\\//g, '/');
  }
  return null;
}

function iframeTrick(id) {
  return new Promise((resolve) => {
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;";
    iframe.src = `https://vidgf.com/embed.php?id=${id}`;
    iframe.sandbox = "allow-scripts allow-same-origin";

    const timeout = setTimeout(() => {
      document.body.removeChild(iframe);
      resolve(null);
    }, 8000);

    iframe.onload = () => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const html = doc.body.innerHTML;
        console.log("[iframe] html:", html.substring(0, 300));
        const link = parseLink(html);
        clearTimeout(timeout);
        document.body.removeChild(iframe);
        resolve(link);
      } catch (e) {
        // cross-origin block
        clearTimeout(timeout);
        document.body.removeChild(iframe);
        resolve(null);
      }
    };

    document.body.appendChild(iframe);
  });
}

function playVideo(link, id) {
  lastLink = link;
  const v = document.getElementById("videoEl");
  v.src = link;
  document.getElementById("linkText").textContent = link;
  document.getElementById("dlBtn").href = link;
  document.getElementById("copyBtn").textContent = "⎘ Salin";
  document.getElementById("copyBtn").classList.remove("ok");
  show("playerBox");
  v.load();
}

function showErr(msg) {
  const el = document.getElementById("errorBox");
  el.textContent = "⚠ " + msg;
  show("errorBox");
}

async function copyLink() {
  if (!lastLink) return;
  try {
    await navigator.clipboard.writeText(lastLink);
    const b = document.getElementById("copyBtn");
    b.textContent = "✓"; b.classList.add("ok");
    setTimeout(() => { b.textContent = "⎘ Salin"; b.classList.remove("ok"); }, 2000);
  } catch (_) {}
}

function addHist(id, link) {
  if (hist.find(h => h.id === id)) return;
  hist.unshift({ id, link });
  if (hist.length > 6) hist.pop();
  renderHist();
}

function renderHist() {
  const sec = document.getElementById("historySection");
  const list = document.getElementById("historyList");
  sec.style.display = hist.length ? "block" : "none";
  list.innerHTML = "";
  hist.forEach((h, i) => {
    const el = document.createElement("div");
    el.className = "history-item";
    el.style.animationDelay = `${i * 25}ms`;
    el.onclick = () => { document.getElementById("videoInput").value = h.id; playVideo(h.link, h.id); };
    el.innerHTML = `<span class="h-id">${h.id}</span><span class="h-link">${h.link}</span>`;
    list.appendChild(el);
  });
}

function clearHistory() { hist.length = 0; renderHist(); }
function setStatus(t) { document.getElementById("loadingText").textContent = t; }
function show(id, d = "block") { document.getElementById(id).style.display = d; }
function hide(id) { document.getElementById(id).style.display = "none"; }

document.getElementById("videoInput").addEventListener("keydown", e => {
  if (e.key === "Enter") getLink();
});
</script>
</body>
</html>
